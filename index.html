    function startQuiz() {

        html += `<div class="carte"><p>${i+1}. ${m.mission}</p><input type='text' placeholder='Réponse ou photo'></div>`;

    // Création carte personnalisée avec téléchargement individuel
    function creerCarte() {

  jouerSon("sonCreation");

  const type = document.getElementById("carteType").value;
  const texte = document.getElementById("carteTexte").value;
      if(texte.trim() === ""){
alert("Écris un texte pour la carte !");
return;
}
  const imageInput = document.getElementById("carteImage");
  const container = document.getElementById("maCarte");

  const carteDiv = document.createElement("div");
  carteDiv.className = "carte";

  const titre = document.createElement("h3");
  titre.innerText = type;
  carteDiv.appendChild(titre);

  const texteDiv = document.createElement("p");
  texteDiv.innerText = texte;
  carteDiv.appendChild(texteDiv);

  if (imageInput.files && imageInput.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = document.createElement("img");
      img.src = e.target.result;
      carteDiv.appendChild(img);
    }
    reader.readAsDataURL(imageInput.files[0]);
  }

  // bouton téléchargement
  const downloadBtn = document.createElement("button");
  downloadBtn.innerText = "Télécharger cette carte";

  downloadBtn.onclick = function() {

    html2canvas(carteDiv).then(canvas => {

      const lien = document.createElement("a");
      lien.download = "ma_carte.png";
      lien.href = canvas.toDataURL("image/png");
      lien.click();

    });

  };

  carteDiv.appendChild(downloadBtn);

  // bouton whatsapp
  const shareBtn = document.createElement("button");

  shareBtn.innerText = "Partager sur WhatsApp";

  shareBtn.onclick = () => {

    const textePartage = type + " : " + texte;

    const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(textePartage);

    window.open(url, "_blank");

  };

  carteDiv.appendChild(shareBtn);

  cartesListe.push(carteDiv);

  container.appendChild(carteDiv);

}

    // Télécharger toutes les cartes en une seule image
    function telechargerToutesCartes() {
      if (cartesListe.length === 0) {
        alert("Crée d'abord au moins une carte !");
        return;
      }

      const tempDiv = document.createElement("div");
      tempDiv.style.backgroundColor = "#fff0f5";
      tempDiv.style.padding = "20px";

      cartesListe.forEach(carte => {
        const clone = carte.cloneNode(true);
      clone.querySelectorAll("button").forEach(b => b.remove());
        tempDiv.appendChild(clone);
      });

      document.body.appendChild(tempDiv);

      html2canvas(tempDiv).then(canvas => {
        const lien = document.createElement("a");
        lien.download = "toutes_les_cartes.png";
        lien.href = canvas.toDataURL("image/png");
        lien.click();
        document.body.removeChild(tempDiv);
      });
        
    }function partagerToutesCartesWhatsApp() {
  if (cartesListe.length === 0) {
    alert("Crée d'abord au moins une carte !");
    return;
  }

  // Construire le texte complet de toutes les cartes
  let texteComplet = "";
  cartesListe.forEach((carte, i) => {
    const type = carte.querySelector("h3").innerText;
    const texte = carte.querySelector("p").innerText;
    texteComplet += `${i+1}. [${type}] ${texte}\n\n`;
  });

  // Ouvrir WhatsApp avec le texte
  const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(texteComplet)}`;
  window.open(url, "_blank");
}

  function melangerDeck(){

for(let i = deck.length-1; i>0; i--){

const j = Math.floor(Math.random()*(i+1));

[deck[i],deck[j]]=[deck[j],deck[i]];

}
    document.getElementById("cardZone").classList.add("shuffle");

setTimeout(()=>{
document.getElementById("cardZone").classList.remove("shuffle");
},500);
  }

alert("Écris le nom et l'action !");

}
